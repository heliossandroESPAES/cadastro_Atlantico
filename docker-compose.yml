services:
  db:
    image: postgres:16-alpine
    container_name: cadastro-atlantico-db
    environment:
      POSTGRES_DB: cadastro_atlantico
      POSTGRES_USER: cadastro_app
      POSTGRES_PASSWORD: cadastro123
    ports:
      - "5432:5432"
    volumes:
      - cadastro_atlantico_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cadastro_app -d cadastro_atlantico"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  cadastro_atlantico_data:
